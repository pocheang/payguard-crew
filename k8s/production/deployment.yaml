apiVersion: v1
kind: Namespace
metadata:
  name: payguard-production
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: payguard-config
  namespace: payguard-production
data:
  APP_ENV: "production"
  DATABASE_TYPE: "postgresql"
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "payguard"
  POSTGRES_USER: "payguard"
  LLM_PROVIDER: "disabled"
  ENABLE_CREWAI: "false"
  RAG_TOP_K: "3"
  LOG_LEVEL: "INFO"
  OTEL_ENABLED: "true"
  OTEL_EXPORTER_TYPE: "otlp"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4317"
---
apiVersion: v1
kind: Secret
metadata:
  name: payguard-secrets
  namespace: payguard-production
type: Opaque
stringData:
  POSTGRES_PASSWORD: "CHANGE_THIS_IN_PRODUCTION"
  JWT_SECRET_KEY: "CHANGE_THIS_TO_SECURE_RANDOM_KEY_AT_LEAST_32_CHARS"
  API_KEYS: "prod-key-1,prod-key-2"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payguard-api
  namespace: payguard-production
  labels:
    app: payguard
    component: api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: payguard
      component: api
  template:
    metadata:
      labels:
        app: payguard
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: payguard-api
        image: ghcr.io/pocheang/payguard-crew:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: payguard-config
              key: APP_ENV
        - name: DATABASE_TYPE
          valueFrom:
            configMapKeyRef:
              name: payguard-config
              key: DATABASE_TYPE
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: payguard-config
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: payguard-config
              key: POSTGRES_PORT
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: payguard-config
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: payguard-config
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: payguard-secrets
              key: POSTGRES_PASSWORD
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: payguard-secrets
              key: JWT_SECRET_KEY
        - name: API_KEYS
          valueFrom:
            secretKeyRef:
              name: payguard-secrets
              key: API_KEYS
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
---
apiVersion: v1
kind: Service
metadata:
  name: payguard-api-service
  namespace: payguard-production
  labels:
    app: payguard
    component: api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: payguard
    component: api
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payguard-ingress
  namespace: payguard-production
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  tls:
  - hosts:
    - payguard.example.com
    secretName: payguard-tls
  rules:
  - host: payguard.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: payguard-api-service
            port:
              number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payguard-hpa
  namespace: payguard-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payguard-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: payguard-pdb
  namespace: payguard-production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: payguard
      component: api
