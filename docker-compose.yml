version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: payguard-backend:latest
    container_name: payguard-backend
    volumes:
      - ./data:/app/data
      - ./docs:/app/docs
      - ./.chroma:/app/.chroma
      - ./logs:/app/logs
      - ./payguard_crew.db:/app/payguard_crew.db
    environment:
      # 应用配置
      - APP_NAME=payguard-crew
      - APP_ENV=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379

      # JWT配置
      - JWT_SECRET_KEY=VSgmlSX-UvRA90MclxehDraXlME5VxMqX_kmOxMRCuvyaD5dvPaqLKUsoYC5wYTz16NRHmOZggm5jJnZkJcmfQ
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30

      # LLM 配置（可选）
      - LLM_PROVIDER=${LLM_PROVIDER:-disabled}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}

      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}

      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434/v1}

      # CrewAI 配置
      - ENABLE_CREWAI=${ENABLE_CREWAI:-false}

      # RAG 配置
      - RAG_TOP_K=${RAG_TOP_K:-3}
      - PAYGUARD_DOCS_DIR=/app/docs

      # 数据库配置
      - SQLITE_DB_PATH=/app/payguard_crew.db

      # LLM 超时配置
      - LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS:-30}
      - LLM_MAX_RETRIES=${LLM_MAX_RETRIES:-2}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - payguard-network

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost/api
    image: payguard-frontend:latest
    container_name: payguard-frontend
    restart: unless-stopped
    networks:
      - payguard-network

  # Redis缓存服务
  redis:
    image: redis:7-alpine
    container_name: payguard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - payguard-network

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: payguard-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - payguard-network

volumes:
  redis-data:
    driver: local

networks:
  payguard-network:
    driver: bridge
